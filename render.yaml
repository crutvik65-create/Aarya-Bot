services:
  - type: web
    name: propvoice-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: RAG_DIR
        value: ./RAG
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: PYTHON_VERSION
        value: 3.11.11
    healthCheckPath: /api/health